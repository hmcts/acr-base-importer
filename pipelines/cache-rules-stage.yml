#
## Stage: Create ACR Cache Rules
## Called by: trivy-scan-import.yml
## Rules are read at runtime from acr-repositories.yaml (single source of truth)
##
parameters:
- name: serviceConnection
  type: string
  default: 'DCD-CNP-PROD'
- name: keyvaultName
  type: string
  default: 'infra-vault-prod'
- name: acrName
  type: string
  default: 'hmctspublic'
- name: trivyVersion
  type: string
  default: '0.70.0'
- name: severityThreshold
  type: string
  default: 'CRITICAL,HIGH'
- name: trivyTimeout
  type: string
  default: '10m'

stages:
- stage: CreateCache
  displayName: 'Create ACR Cache Rules'
  jobs:
  - job: ValidateAndCreateCacheRules
    displayName: 'Scan Cache Rules and Create Rules'
    timeoutInMinutes: 180  # 3 hours - scanning multiple repos takes time
    pool:
      vmImage: ubuntu-latest
    steps:
    # Get ACR credentials from Key Vault
    - task: AzureKeyVault@2
      displayName: 'Get ACR credentials from Key Vault'
      inputs:
        azureSubscription: ${{ parameters.serviceConnection }}
        keyVaultName: ${{ parameters.keyvaultName }}
        secretsFilter: 'registry-public-username,registry-public-password'

    # Setup Trivy once for all cache rule scanning
    - template: ../templates/setup-trivy.yml
      parameters:
        trivyVersion: ${{ parameters.trivyVersion }}

    # Process all cache rules from acr-repositories.yaml
    - task: AzureCLI@2
      displayName: 'Process all cache rules from acr-repositories.yaml'
      inputs:
        azureSubscription: ${{ parameters.serviceConnection }}
        scriptType: bash
        scriptLocation: inlineScript
        inlineScript: |
          set -uo pipefail  # note: intentionally no -e, errors are handled per rule

          ACR_NAME="${{ parameters.acrName }}"
          SEVERITY="${{ parameters.severityThreshold }}"
          TIMEOUT="${{ parameters.trivyTimeout }}"
          YAML_FILE="$(System.DefaultWorkingDirectory)/acr-repositories.yaml"

          # Login to ACR once so Trivy can pull images for scanning
          az acr login --name "$ACR_NAME"

          # Parse acr-repositories.yaml into JSON using Python3 (pre-installed on ubuntu-latest)
          RULES_JSON=$(python3 -c "
          import yaml, json, sys
          data = yaml.safe_load(open('$YAML_FILE'))
          print(json.dumps(data['rules']))
          ")

          RULE_KEYS=$(echo "$RULES_JSON" | jq -r 'keys[]')

          while IFS= read -r key; do
            RULE_NAME=$(echo "$RULES_JSON" | jq -r --arg k "$key" '.[$k].ruleName')
            REPO_NAME=$(echo "$RULES_JSON" | jq -r --arg k "$key" '.[$k].repoName')
            REGISTRY=$(echo  "$RULES_JSON" | jq -r --arg k "$key" '.[$k].registry')
            DEST_REPO=$(echo "$RULES_JSON" | jq -r --arg k "$key" '.[$k].destinationRepo')

            echo ""
            echo "=========================================="
            echo "Processing: $RULE_NAME"
            echo "  Source:      $REGISTRY/$REPO_NAME"
            echo "  Destination: $ACR_NAME.azurecr.io/$DEST_REPO"
            echo "=========================================="

            # --- Step 1: Create cache rule if it does not exist ---
            rule_found=$(az acr cache show --registry "$ACR_NAME" --name "$RULE_NAME" --query "name" -o tsv 2>/dev/null || echo "")
            if [ -n "$rule_found" ]; then
              echo "✓ Cache rule '$RULE_NAME' already exists - skipping creation"
            else
              echo "Creating cache rule '$RULE_NAME' ..."
              if az acr cache create -r "$ACR_NAME" -n "$RULE_NAME" -s "$REGISTRY/$REPO_NAME" -t "$DEST_REPO" 2>&1; then
                echo "✓ Created cache rule: $RULE_NAME"
              else
                echo "##vso[task.logissue type=warning]Could not create cache rule '$RULE_NAME' - skipping"
                continue
              fi
            fi

            # --- Step 2: Find a tag to scan ---
            TAGS_JSON=$(az acr repository show-tags -n "$ACR_NAME" --repository "$DEST_REPO" -o json 2>/dev/null || echo "[]")

            if [ -z "$TAGS_JSON" ] || [ "$TAGS_JSON" == "[]" ]; then
              echo "##vso[task.logissue type=warning]No tags found for $DEST_REPO (repo may not exist yet) - skipping scan"
              continue
            fi

            if echo "$TAGS_JSON" | jq -e '.[] | select(. == "latest")' >/dev/null 2>&1; then
              TAG_TO_SCAN="latest"
            else
              # Exclude cosign signature tags (sha256-*.sig) before picking the most recent
              TAG_TO_SCAN=$(az acr repository show-tags -n "$ACR_NAME" --repository "$DEST_REPO" --orderby time_desc --output tsv | grep -v '\.sig$' | head -n 1)
            fi

            if [ -z "$TAG_TO_SCAN" ] || [ "$TAG_TO_SCAN" == "null" ]; then
              echo "##vso[task.logissue type=warning]Could not determine a tag for $DEST_REPO - skipping scan"
              continue
            fi

            # --- Step 3: Scan with Trivy ---
            IMAGE_TO_SCAN="$ACR_NAME.azurecr.io/$DEST_REPO:$TAG_TO_SCAN"
            SAFE_NAME=$(echo "$RULE_NAME" | tr '-' '_')

            echo "Scanning: $IMAGE_TO_SCAN"

            if ! ./trivy image \
              --severity "$SEVERITY" \
              --format json \
              --timeout "$TIMEOUT" \
              --ignore-unfixed \
              --scanners vuln \
              --output "trivy-report-${SAFE_NAME}.json" \
              "$IMAGE_TO_SCAN"; then
              echo "##vso[task.logissue type=warning]Trivy scan failed for $IMAGE_TO_SCAN - skipping"
              continue
            fi

            CRITICAL_COUNT=$(jq '[.Results[]?.Vulnerabilities[]? | select(.Severity=="CRITICAL")] | length' "trivy-report-${SAFE_NAME}.json")
            HIGH_COUNT=$(jq    '[.Results[]?.Vulnerabilities[]? | select(.Severity=="HIGH")]     | length' "trivy-report-${SAFE_NAME}.json")

            ./trivy convert --format table --output "trivy-scan-${SAFE_NAME}.txt" "trivy-report-${SAFE_NAME}.json" || true

            echo ""
            echo "--- Scan Report: $RULE_NAME ---"
            cat "trivy-scan-${SAFE_NAME}.txt" || echo "Unable to display report"
            echo "Vulnerabilities found: Critical=$CRITICAL_COUNT, High=$HIGH_COUNT"

            if [ "$CRITICAL_COUNT" -gt 0 ]; then
              echo "##vso[task.logissue type=warning][$RULE_NAME] $CRITICAL_COUNT critical vulnerabilities found in $IMAGE_TO_SCAN"
            else
              echo "✓ Scan passed for $RULE_NAME - no critical vulnerabilities"
            fi

          done <<< "$RULE_KEYS"
