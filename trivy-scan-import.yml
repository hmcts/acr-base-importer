## Main Orchestration Pipeline
## Scan and import container images using Trivy
## This pipeline coordinates base image imports and ACR cache rule creation
## Cache rules are defined in acr-repositories.yaml (single source of truth)
##
name: Trivy Scan and ACR Import
trigger:
  - master
pr: none

schedules:
  - cron: '0 1 * * *'
    displayName: Daily vulnerability scan and import
    branches:
      include:
      - master
    always: 'true'

parameters:
- name: baseImagestoImport
  type: object
  displayName: 'Images to scan and import'
  default:
    - baseRegistry: 'gcr.io'
      baseImage: 'distroless/java25-debian13'
      baseTag: 'latest'
      targetImage: 'imported/distroless/java25'
    - baseRegistry: 'gcr.io'
      baseImage: 'distroless/java25-debian13'
      baseTag: 'debug'
      targetImage: 'imported/distroless/java25'
    - baseRegistry: 'gcr.io'
      baseImage: 'distroless/base-debian13'
      baseTag: 'latest'
      targetImage: 'imported/distroless/base-debian13'
    - baseRegistry: 'gcr.io'
      baseImage: 'distroless/java21-debian12'
      baseTag: 'latest'
      targetImage: 'imported/distroless/java21'
    - baseRegistry: 'gcr.io'
      baseImage: 'distroless/java21-debian12'
      baseTag: 'debug'
      targetImage: 'imported/distroless/java21'
    - baseRegistry: 'gcr.io'
      baseImage: 'distroless/java17-debian12'
      baseTag: 'latest'
      targetImage: 'imported/distroless/java17'
    - baseRegistry: 'gcr.io'
      baseImage: 'distroless/java17-debian12'
      baseTag: 'debug'
      targetImage: 'imported/distroless/java17'
    - baseRegistry: 'gcr.io'
      baseImage: 'distroless/python3-debian13'
      baseTag: 'latest'
      targetImage: 'imported/distroless/python3'
    - baseRegistry: 'gcr.io'
      baseImage: 'distroless/python3-debian13'
      baseTag: 'debug'
      targetImage: 'imported/distroless/python3'
    - baseRegistry: 'docker.io'
      baseImage: 'python'
      baseTag: '3.13-slim-trixie'
      targetImage: 'imported/slim/python'
- name: importToProd
  type: boolean
  displayName: 'Import base images into hmctsprod'
  default: true
- name: importToSbox
  type: boolean
  displayName: 'Import base images into hmctssbox (sbox)'
  default: false

variables:
  - name: acrName
    value: 'hmctsprod'
  - name: targetRegistry
    value: 'hmctsprod.azurecr.io'
  - name: keyvaultName
    value: 'infra-vault-prod'
  - name: serviceConnection
    value: 'DCD-CNP-PROD'
  - name: trivyVersion
    value: '0.70.0'
  - name: severityThreshold
    value: 'CRITICAL,HIGH'
  - name: trivyTimeout
    value: '10m'

stages:
  # Prod (importToProd, default true): scan + import base images, then create/validate cache rules.
  # Runs on the daily schedule and on merge to master.
  - ${{ if eq(parameters.importToProd, true) }}:
    # Stage 1: Import base images to hmctsprod
    - template: pipelines/base-image-import-stage.yml
      parameters:
        baseImagestoImport: ${{ parameters.baseImagestoImport }}
        serviceConnection: $(serviceConnection)
        keyvaultName: $(keyvaultName)
        acrName: $(acrName)
        trivyVersion: $(trivyVersion)
        severityThreshold: $(severityThreshold)
        trivyTimeout: $(trivyTimeout)

    # Stage 2: Create and validate cache rules (rules read from acr-repositories.yaml at runtime)
    - template: pipelines/cache-rules-stage.yml
      parameters:
        serviceConnection: $(serviceConnection)
        keyvaultName: $(keyvaultName)
        acrName: $(acrName)
        trivyVersion: $(trivyVersion)
        severityThreshold: $(severityThreshold)
        trivyTimeout: $(trivyTimeout)

  # Sbox (importToSbox, default false): import the same base images into hmctssbox.
  # Opt-in only - tick the parameter on a manual run. Independent of prod
  - ${{ if eq(parameters.importToSbox, true) }}:
    - template: pipelines/base-image-import-stage.yml
      parameters:
        baseImagestoImport: ${{ parameters.baseImagestoImport }}
        serviceConnection: 'DCD-CFT-Sandbox'
        keyvaultName: 'infra-vault-sandbox'
        acrName: 'hmctssbox'
        trivyVersion: $(trivyVersion)
        severityThreshold: $(severityThreshold)
        trivyTimeout: $(trivyTimeout)
        stageName: 'ScanAndImportSbox'
        stageDisplayName: 'Scan with Trivy and Import to sbox ACR'
        dependsOn: []
